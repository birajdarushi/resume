<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Auth Callback</title>
    <script>
        window.onload = () => {
    const hash = window.location.hash.substring(1);
    const accessToken = new URLSearchParams(hash).get('access_token');
    localStorage.setItem('spotify_access_token', accessToken);
    // Redirect to another page or back to your main application
    window.location.href = "https://rushiraj.online";
};

    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
